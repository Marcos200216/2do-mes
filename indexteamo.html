<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Por qué te amo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --wine:#3d0e1a;
    --wine-deep:#22070d;
    --gold:#c9a15a;
    --gold-light:#e8cd94;
    --parchment:#f6ead7;
    --ink:#4a2c1c;
    --rose:#d88a9a;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(ellipse at 50% -10%, #5a1626 0%, var(--wine) 45%, var(--wine-deep) 100%);
    font-family:'Cormorant Garamond', serif;
    color: var(--parchment);
    overflow-x:hidden;
  }

  .petals{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .petal{
    position:absolute; font-size: 14px; opacity:0;
    animation: fall linear infinite;
    color: var(--rose);
  }
  @keyframes fall{
    0%{ transform: translateY(-8vh) rotate(0deg); opacity:0; }
    10%{ opacity:0.65; }
    90%{ opacity:0.4; }
    100%{ transform: translateY(108vh) rotate(200deg); opacity:0; }
  }

  .close-btn{
    position:fixed; top:18px; right:18px; z-index:20;
    width:36px; height:36px; border-radius:50%;
    background: rgba(246,234,215,0.06);
    border: 1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    color: var(--gold-light); font-size:19px; text-decoration:none;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .close-btn:hover{ transform: scale(1.08); background: rgba(246,234,215,0.14); }

  .page{
    position:relative; z-index:1;
    max-width: 560px; margin:0 auto;
    min-height:100vh;
    padding: 70px 24px 50px;
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
  }

  .title{
    font-family:'Alex Brush', cursive;
    font-size: clamp(42px, 10vw, 62px);
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,161,90,0.35);
    margin: 0 0 2px;
    line-height:1;
  }
  .subtitle{
    font-style: italic; color: var(--rose);
    font-size: clamp(14px, 3.4vw, 17px);
    margin: 0 0 34px;
  }

  .counter{
    font-size: 13px; letter-spacing: 2px; text-transform:uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .progress-track{
    width: 140px; height:2px; background: rgba(201,161,90,0.25);
    border-radius:2px; overflow:hidden; margin-bottom: 46px;
  }
  .progress-fill{
    height:100%; background: var(--gold-light);
    transition: width 0.5s ease;
  }

  .card-wrap{
    position:relative; width:100%;
    min-height: 210px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 40px;
  }
  .ornament-top, .ornament-bottom{
    font-size: 20px; color: var(--gold); opacity:0.8;
  }
  .ornament-top{ margin-bottom:16px; }
  .ornament-bottom{ margin-top:16px; }

  .reason-card{
    display:flex; flex-direction:column; align-items:center;
    opacity:0; transform: translateY(14px) scale(0.98);
    transition: opacity 0.55s ease, transform 0.55s ease;
    width:100%;
  }
  .reason-card.show{ opacity:1; transform: translateY(0) scale(1); }

  .reason-text{
    font-size: clamp(19px, 4.6vw, 26px);
    font-style: italic;
    line-height: 1.55;
    color: var(--parchment);
    max-width: 460px;
  }

  .nav-row{
    display:flex; align-items:center; justify-content:center;
    gap: 30px; margin-bottom: 26px;
  }
  .nav-btn{
    background:none; border:none; cursor:pointer;
    color: var(--gold-light); padding:8px;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .nav-btn svg{ width:22px; height:22px; }
  .nav-btn:hover{ transform: scale(1.15); }
  .nav-btn:disabled{ opacity:0.25; cursor:default; }
  .nav-btn:disabled:hover{ transform:none; }

  .surprise-btn{
    background: none;
    border: 1px solid rgba(201,161,90,0.5);
    color: var(--gold-light);
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    padding: 9px 22px;
    border-radius: 22px;
    cursor:pointer;
    letter-spacing:0.4px;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
  }
  .surprise-btn:hover{
    background: rgba(246,234,215,0.08);
    border-color: var(--gold-light);
    transform: translateY(-2px);
  }

  .burst{
    position:fixed; pointer-events:none; z-index:15;
    font-size: 18px; color: var(--rose);
    animation: burstOut 0.9s ease-out forwards;
  }
  @keyframes burstOut{
    0%{ transform: translate(-50%,-50%) scale(0.4); opacity:1; }
    100%{ transform: translate(var(--bx), var(--by)) scale(1.1); opacity:0; }
  }

  @media (max-width: 380px){
    .nav-row{ gap: 22px; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>
<a class="close-btn" href="index2.html" title="volver">&times;</a>

<div class="page">
  <h1 class="title">30 razones</h1>
  <p class="subtitle">para amarte, mi amor</p>

  <div class="counter" id="counter">Razón 01 de 30</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="card-wrap">
    <div class="reason-card show" id="reasonCard">
      <div class="ornament-top">✦</div>
      <p class="reason-text" id="reasonText"></p>
      <div class="ornament-bottom">✦</div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" title="anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="surprise-btn" id="surpriseBtn">sorpréndeme</button>
    <button class="nav-btn" id="nextBtn" title="siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </button>
  </div>
</div>

<script>
  const reasons = [
    "Porque tu risa arregla cualquier día malo que yo tenga.",
    "Porque cuando hablas de tus sueños, se me olvida hasta respirar.",
    "Porque eres preciosa, por dentro y por fuera, y a veces se me olvida hasta lo que iba a decir con solo verte.",
    "Porque tu abrazo se siente como llegar a casa, sin importar dónde estemos.",
    "Porque eres de las personas más fuertes que conozco, aunque a veces tú no lo notes.",
    "Porque me escuchas de verdad, no solo esperas tu turno para hablar.",
    "Porque tienes esa costumbre de tararear canciones sin darte cuenta, y se me quedan pegadas todo el día.",
    "Porque tu forma de amar es generosa, sin condiciones ni medias tintas.",
    "Porque me haces querer ser mejor persona, y mejor cristiano, solo por estar a tu lado.",
    "Porque frunces la nariz cuando te enojas, y me hace sonreír aunque no debería.",
    "Porque confías en mí incluso cuando yo dudo de mí mismo.",
    "Porque tu mirada dice cosas que ni las palabras alcanzan a explicar.",
    "Porque contigo hasta los silencios se sienten cómodos.",
    "Porque celebras mis logros como si fueran tuyos.",
    "Porque tienes un corazón enorme para todos los que te rodean, siempre amable, siempre respetuosa.",
    "Porque me haces reír hasta que me duele el estómago.",
    "Porque cada \"buenos días\" tuyo es el mejor inicio de mi día.",
    "Porque eres curiosa, siempre queriendo aprender algo nuevo.",
    "Porque tienes una madurez que sorprende para tu edad, y de la que aprendo todos los días.",
    "Porque me cuidas hasta en los detalles más pequeños que yo ni noto.",
    "Porque tu fe en Dios es tan firme que me inspira a acercarme más a Él.",
    "Porque sabes perdonar, y eso te hace increíblemente valiente.",
    "Porque me haces sentir en casa en cualquier lugar del mundo.",
    "Porque tienes sueños y anhelos que persigues con una paciencia admirable, sabiendo que su momento va a llegar.",
    "Porque cada plan contigo, por simple que sea, se convierte en mi favorito.",
    "Porque la forma en que amas a tu familia, y lo unida que vives con ellos, me enseña lo que es el amor de verdad.",
    "Porque me retas a crecer, a ser mejor, sin dejar nunca de aceptarme como soy.",
    "Porque, a pesar de la distancia, siempre encuentras la manera de hacerme sentir cerca de ti.",
    "Porque encuentras belleza en las cosas que a otros les pasan desapercibidas.",
    "Porque simplemente eres tú, mi amor. Y esa es la razón más grande de todas."
  ];

  let index = 0;
  const reasonText = document.getElementById('reasonText');
  const reasonCard = document.getElementById('reasonCard');
  const counter = document.getElementById('counter');
  const progressFill = document.getElementById('progressFill');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function render(){
    reasonText.textContent = reasons[index];
    counter.textContent = `Razón ${String(index+1).padStart(2,'0')} de ${reasons.length}`;
    progressFill.style.width = ((index+1)/reasons.length*100) + '%';
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === reasons.length - 1;
  }

  function transitionTo(newIndex){
    reasonCard.classList.remove('show');
    setTimeout(() => {
      index = newIndex;
      render();
      reasonCard.classList.add('show');
      spawnBurst();
    }, 260);
  }

  prevBtn.addEventListener('click', () => { if(index>0) transitionTo(index-1); });
  nextBtn.addEventListener('click', () => { if(index<reasons.length-1) transitionTo(index+1); });

  document.getElementById('surpriseBtn').addEventListener('click', () => {
    let r;
    do { r = Math.floor(Math.random()*reasons.length); } while(r === index && reasons.length > 1);
    transitionTo(r);
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight' && index < reasons.length-1) transitionTo(index+1);
    if(e.key === 'ArrowLeft' && index > 0) transitionTo(index-1);
  });

  /* swipe support */
  let touchX = null;
  document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    if(touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(dx < -40 && index < reasons.length-1) transitionTo(index+1);
    if(dx > 40 && index > 0) transitionTo(index-1);
    touchX = null;
  });

  /* burst de corazones al cambiar de razón */
  const heartGlyphs = ['❤','♡','✦','💗'];
  function spawnBurst(){
    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2 - 40;
    for(let i=0;i<7;i++){
      const el = document.createElement('span');
      el.className = 'burst';
      el.textContent = heartGlyphs[Math.floor(Math.random()*heartGlyphs.length)];
      const angle = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*70;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--bx', (Math.cos(angle)*dist) + 'px');
      el.style.setProperty('--by', (Math.sin(angle)*dist) + 'px');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 950);
    }
  }

  /* petalos ambientales */
  const petalsWrap = document.getElementById('petals');
  const petalGlyphs = ['❦','✦','❁'];
  for(let i=0;i<16;i++){
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = petalGlyphs[Math.floor(Math.random()*petalGlyphs.length)];
    p.style.left = Math.random()*100 + '%';
    p.style.fontSize = (10 + Math.random()*10) + 'px';
    p.style.animationDuration = (14+Math.random()*14) + 's';
    p.style.animationDelay = (Math.random()*14) + 's';
    petalsWrap.appendChild(p);
  }

  render();
</script>
</body>
</html>
